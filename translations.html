<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verginius | Translations</title>
    <link rel="stylesheet" href="assets/common.css">
    <script src="assets/common.js" defer></script>
    <style>
        #trans-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .trans-card {
            border: var(--border-style);
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .trans-card:hover {
            background-color: var(--hover-bg);
            transform: translateX(5px);
        }

        .trans-logo {
            width: 60px;
            height: 60px;
            border-radius: 4px;
            object-fit: cover;
            background-color: var(--dim-color);
            flex-shrink: 0;
        }

        .trans-content {
            flex: 1;
        }

        .trans-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.5rem;
        }

        .trans-name {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .trans-game {
            font-size: 0.8rem;
            color: var(--dim-color);
            text-transform: uppercase;
            border: var(--border-style);
            padding: 2px 6px;
            opacity: 0.7;
        }

        #loading, #error {
            padding: 2rem;
            text-align: center;
            font-style: italic;
            color: var(--dim-color);
        }

        @media (max-width: 600px) {
            .trans-card { flex-direction: column; align-items: flex-start; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
            animation: fadeIn 0.5s ease-in;
        }

        .stat-box {
            border: var(--border-style);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .stat-box:hover {
            transform: translateY(-2px);
            background: var(--hover-bg);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 300;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--dim-color);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header id="site-header"></header>

    <main>
        <div class="section-title">CONTRIBUTIONS</div>
        <div id="stats-loading" style="text-align: center; color: var(--dim-color); margin-bottom: 2rem;">Loading stats...</div>
        <div class="stats-grid" id="stats-grid" style="display: none;">
            <div class="stat-box">
                <div class="stat-value" id="stat-translated">0</div>
                <div class="stat-label">Translations</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="stat-edited">0</div>
                <div class="stat-label">Edits</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="stat-reviewed">0</div>
                <div class="stat-label">Reviews</div>
            </div>
             <div class="stat-box">
                <div class="stat-value" id="stat-commented">0</div>
                <div class="stat-label">Comments</div>
            </div>
        </div>

        <div class="section-title">TRANSLATION PROJECTS</div>
        <div id="loading">正在获取 Paratranz 数据...</div>
        <div id="error" style="display: none;">无法加载数据，可能是由于网络问题或 API 限制。</div>
        <div id="trans-container"></div>
    </main>

    <footer>
        <span>&copy; <span id="year"></span> VERGINIUS</span>
        <span>GENERATED VIA PARATRANZ API</span>
    </footer>

    <script>
        const USER_ID = 2888; // Based on previous fetch
        const PROXY_URL = 'https://api.codetabs.com/v1/proxy?quest=';

        /**
         * 通用获取数据函数，包含 CORS 代理降级策略
         */
        async function fetchData(url) {
            try {
                // 1. 尝试直连
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Direct fetch failed: ${response.status}`);
                return await response.json();
            } catch (err) {
                console.warn(`Direct fetch failed for ${url}, trying proxy...`, err);
                // 2. 如果直连失败（如 CORS 错误），尝试使用代理
                try {
                    const proxyResponse = await fetch(PROXY_URL + encodeURIComponent(url));
                    if (!proxyResponse.ok) throw new Error(`Proxy fetch failed: ${proxyResponse.status}`);
                    return await proxyResponse.json();
                } catch (proxyErr) {
                    console.error(`All fetch attempts failed for ${url}`, proxyErr);
                    throw proxyErr; // 抛出最终错误
                }
            }
        }

        async function fetchUserStats() {
            const statsGrid = document.getElementById('stats-grid');
            const statsLoading = document.getElementById('stats-loading');
            
            try {
                const data = await fetchData(`https://paratranz.cn/api/users/${USER_ID}`);
                
                document.getElementById('stat-translated').textContent = data.translated || 0;
                document.getElementById('stat-edited').textContent = data.edited || 0;
                document.getElementById('stat-reviewed').textContent = data.reviewed || 0;
                document.getElementById('stat-commented').textContent = data.commented || 0;
                
                statsLoading.style.display = 'none';
                statsGrid.style.display = 'grid';
            } catch (err) {
                console.error('Stats fetch error:', err);
                statsLoading.textContent = 'Stats unavailable (CORS/Network error)';
            }
        }

        async function fetchTranslations() {
            const container = document.getElementById('trans-container');
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');

            try {
                const data = await fetchData(`https://paratranz.cn/api/users/${USER_ID}/projects`);
                
                // The API returns an array of user project relations.
                // Each item has a "project" object containing details.
                const projects = data.map(item => {
                    const projectDetails = item.project || {};
                    return {
                        id: projectDetails.id,
                        name: projectDetails.name || 'Unknown Project',
                        logo: projectDetails.logo,
                        game: item.game || 'Game',
                        stage: projectDetails.stage,
                        // Add any other properties you need from projectDetails
                    };
                });

                loading.style.display = 'none';

                if (!projects || projects.length === 0) {
                    container.innerHTML = '<p style="text-align:center; color:var(--dim-color);">暂无参与的翻译项目。</p>';
                    return;
                }

                container.innerHTML = ''; // clear loading message if still there

                projects.forEach(p => {
                    const card = document.createElement('a');
                    card.className = 'trans-card';
                    card.href = `https://paratranz.cn/projects/${p.id}`;
                    card.target = '_blank';

                    let logoUrl = p.logo;
                    if (logoUrl && !logoUrl.startsWith('http')) {
                        logoUrl = 'https://static.paratranz.cn' + logoUrl;
                    } 
                    if (!logoUrl) logoUrl = 'https://static.paratranz.cn/img/logo.png'; 

                    card.innerHTML = `
                        <img src="${logoUrl}" class="trans-logo" onerror="this.style.display='none'">
                        <div class="trans-content">
                            <div class="trans-header">
                                <span class="trans-name">${p.name}</span>
                                <span class="trans-game">${p.game || 'GAME'}</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                console.error('Fetch error:', err);
                loading.style.display = 'none';
                error.innerHTML = '无法加载数据 / Unable to load data<br><small style="font-size:0.8em; color:var(--dim-color);">' + err.message + '</small>';
                error.style.display = 'block';
            }
        }

        async function init() {
            try {
                // Fetch stats and projects in parallel
                await Promise.all([fetchUserStats(), fetchTranslations()]);
            } catch (err) {
                console.error('Initialization error:', err);
            }
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
