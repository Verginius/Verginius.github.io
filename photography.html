<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verginius | Photography</title>
    <link rel="stylesheet" href="assets/common.css">
    <script src="assets/common.js" defer></script>
    <style>
        /* Photography Section Styles */
        #photo-layout {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center; /* Center the featured image */
        }

        #featured-wrapper {
            width: 100%;
            max-width: 800px; /* Limit max width for better viewing on large screens */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--hover-bg);
            border: var(--border-style);
            padding: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            min-height: 400px; /* Reserve space to prevent layout jump */
        }

        #featured-image {
            max-width: 100%;
            max-height: 70vh; /* Don't be too tall */
            object-fit: contain;
            cursor: zoom-in; /* Indicate full size view */
            transition: opacity 0.3s ease;
        }

        #thumbnails-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 columns for the remaining photos */
            gap: 1rem;
            width: 100%;
        }

        .thumbnail-card {
            border: var(--border-style);
            aspect-ratio: 4/3;
            overflow: hidden;
            background-color: var(--hover-bg);
            cursor: pointer;
            opacity: 0.8;
            transition: all 0.2s ease;
        }

        .thumbnail-card:hover {
            opacity: 1;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .thumbnail-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block; 
        }

        /* Mobile adjustments */
        @media (max-width: 768px) {
            #thumbnails-container {
                grid-template-columns: repeat(3, 1fr); /* 3 cols on mobile */
                gap: 0.5rem;
            }
            #featured-wrapper {
                padding: 0.5rem;
                min-height: 300px;
            }
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .pagination button {
            background: none;
            border: var(--border-style);
            color: var(--text-color);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            background-color: var(--text-color);
            color: var(--bg-color);
        }
        
        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: var(--dim-color);
        }
        
        .pagination-info {
            text-align: center; 
            font-size: 0.8rem;
            color: var(--dim-color);
            margin-top: 0.5rem;
        }

    </style>
</head>
<body>

    <header id="site-header"></header>

    <main>
        <div class="section-title">PHOTOGRAPHY</div>
        <div id="photo-layout">
            <div id="featured-wrapper">
                <img id="featured-image" alt="Featured Work" onclick="viewFullSize()">
            </div>
            <div id="thumbnails-container">
                <!-- 5 items will be loaded here -->
            </div>
            <div class="pagination">
                <button id="prev-btn" onclick="changePage(-1)">PREV</button>
                <button id="next-btn" onclick="changePage(1)">NEXT</button>
            </div>
            <div id="page-info" class="pagination-info">Page 1</div>
        </div>
    </main>

    <footer>
        <span>&copy; <span id="year"></span> VERGINIUS</span>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <script>
        let db = null;
        let photoFilenames = [];
        const blobURLs = new Map();
        const itemsPerPage = 6;
        let currentPage = 1;
        let currentFeaturedIndex = 0;

        async function initDB() {
            document.getElementById('page-info').textContent = 'Loading...';
            document.getElementById('prev-btn').disabled = true;
            document.getElementById('next-btn').disabled = true;
            try {
                const SQL = await initSqlJs({
                    locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${file}`
                });
                const response = await fetch('assets/data.db');
                if (!response.ok) throw new Error('DB not found');
                const buffer = await response.arrayBuffer();
                db = new SQL.Database(new Uint8Array(buffer));

                const result = db.exec('SELECT filename FROM photos ORDER BY filename DESC');
                if (result.length > 0) {
                    photoFilenames = result[0].values.map(row => row[0]);
                }
                renderPhotos();
            } catch (err) {
                document.getElementById('page-info').textContent = 'Failed to load photos.';
                console.error(err);
            }
        }

        function getImageURL(filename) {
            if (blobURLs.has(filename)) return blobURLs.get(filename);
            const result = db.exec('SELECT data FROM photos WHERE filename = ?', [filename]);
            if (!result.length) return null;
            const blob = new Blob([result[0].values[0][0]], { type: 'image/jpeg' });
            const url = URL.createObjectURL(blob);
            blobURLs.set(filename, url);
            return url;
        }

        function renderPhotos() {
            if (!db) return;
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = photoFilenames.slice(start, end);
            if (pageItems.length === 0) return;
            if (currentFeaturedIndex >= pageItems.length) currentFeaturedIndex = 0;

            const featuredImg = document.getElementById('featured-image');
            featuredImg.style.opacity = 0.5;
            setTimeout(() => {
                featuredImg.src = getImageURL(pageItems[currentFeaturedIndex]);
                featuredImg.alt = pageItems[currentFeaturedIndex];
                featuredImg.style.opacity = 1;
            }, 100);

            const thumbsContainer = document.getElementById('thumbnails-container');
            thumbsContainer.innerHTML = '';
            pageItems.forEach((filename, index) => {
                if (index === currentFeaturedIndex) return;
                const card = document.createElement('div');
                card.className = 'thumbnail-card';
                const img = document.createElement('img');
                img.src = getImageURL(filename);
                img.alt = filename;
                img.loading = 'lazy';
                card.appendChild(img);
                card.onclick = () => { currentFeaturedIndex = index; renderPhotos(); };
                card.title = 'View larger';
                thumbsContainer.appendChild(card);
            });

            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = end >= photoFilenames.length;
            const totalPages = Math.ceil(photoFilenames.length / itemsPerPage);
            document.getElementById('page-info').textContent = `PAGE ${currentPage} / ${totalPages}`;
        }

        function changePage(delta) {
            currentPage += delta;
            currentFeaturedIndex = 0;
            renderPhotos();
        }

        function viewFullSize() {
            const featuredImg = document.getElementById('featured-image');
            if (featuredImg.src) window.open(featuredImg.src, '_blank');
        }

        window.addEventListener('DOMContentLoaded', initDB);
    </script>
</body>
</html>
