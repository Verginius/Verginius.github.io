<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verginius | Repository Hub</title>
    <link rel="stylesheet" href="assets/common.css">
    <script src="assets/common.js" defer></script>
    <style>
        /* CV / Markdown Styles */
        #cv-content h1 {
            font-size: 1.8rem;
            font-weight: 200;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        #cv-content h2 {
            font-size: 1.1rem;
            font-weight: 400;
            text-transform: uppercase;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            padding-bottom: 0.3rem;
            border-bottom: var(--border-style);
        }

        #cv-content h3 {
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: 1.2rem;
            margin-bottom: 0.2rem;
        }

        #cv-content p {
            font-size: 0.85rem;
            color: var(--dim-color);
            margin-bottom: 0.4rem;
        }

        #cv-content ul {
            list-style: none;
            padding: 0;
        }

        #cv-content ul li {
            font-size: 0.85rem;
            color: var(--dim-color);
            padding-left: 1rem;
            margin-bottom: 0.3rem;
            position: relative;
        }

        #cv-content ul li::before {
            content: "—";
            position: absolute;
            left: 0;
            opacity: 0.4;
        }

        #cv-content strong {
            color: var(--text-color);
            font-weight: 500;
        }

        #cv-loading {
            padding: 2rem;
            text-align: center;
            font-style: italic;
            color: var(--dim-color);
        }
    </style>
</head>
<body>

    <header id="site-header"></header>

    <main>
        <div id="cv-loading">Loading resume...</div>
        <div id="cv-content"></div>
    </main>

    <footer>
        <span>&copy; <span id="year"></span> VERGINIUS</span>
        <span>LI ZHENGXUAN</span>
    </footer>

    <script src="/js/marked.min.js"></script>
    <script src="/js/sql/sql-wasm.js"></script>
    <script>
        async function loadCV() {
            try {
                const SQL = await initSqlJs({
                    locateFile: file => `/js/sql/${file}`
                });
                const response = await fetch('assets/data.db');
                if (!response.ok) throw new Error('DB not found');
                const buffer = await response.arrayBuffer();
                const db = new SQL.Database(new Uint8Array(buffer));

                const result = db.exec("SELECT content FROM documents WHERE name = 'cv'");
                if (result.length > 0) {
                    document.getElementById('cv-loading').style.display = 'none';
                    document.getElementById('cv-content').innerHTML = marked.parse(result[0].values[0][0]);
                }
            } catch (err) {
                document.getElementById('cv-loading').textContent = 'Unable to load resume.';
                console.error(err);
            }
        }

        window.addEventListener('DOMContentLoaded', loadCV);
    </script>
