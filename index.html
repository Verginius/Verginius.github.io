<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verginius | Repository Hub</title>
    <!-- 引用等宽字体增强复古感 -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=JetBrains+Mono:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --dim-color: #666666;
            --border-style: 1px solid #000000;
            --hover-bg: #f0f0f0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-color: #ffffff;
                --dim-color: #999999;
                --border-style: 1px solid #ffffff;
                --hover-bg: #1a1a1a;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            line-height: 1.6;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
            transition: background 0.3s, color 0.3s;
        }

        header {
            border-bottom: var(--border-style);
            padding-bottom: 2rem;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .bio {
            margin-top: 1rem;
            color: var(--dim-color);
            font-size: 0.9rem;
        }

        .nav-links {
            margin-top: 1.5rem;
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            font-size: 0.85rem;
        }

        .nav-links a:hover {
            border-bottom: var(--border-style);
        }

        .section-title {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--text-color);
            margin-left: 1rem;
            opacity: 0.3;
        }

        .nav-links a.active {
            border-bottom: var(--border-style);
        }

        .nav-links a {
            cursor: pointer;
        }

        /* CV / Markdown Styles */
        #cv-content h1 {
            font-size: 1.8rem;
            font-weight: 200;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        #cv-content h2 {
            font-size: 1.1rem;
            font-weight: 400;
            text-transform: uppercase;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            padding-bottom: 0.3rem;
            border-bottom: var(--border-style);
        }

        #cv-content h3 {
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: 1.2rem;
            margin-bottom: 0.2rem;
        }

        #cv-content p {
            font-size: 0.85rem;
            color: var(--dim-color);
            margin-bottom: 0.4rem;
        }

        #cv-content ul {
            list-style: none;
            padding: 0;
        }

        #cv-content ul li {
            font-size: 0.85rem;
            color: var(--dim-color);
            padding-left: 1rem;
            margin-bottom: 0.3rem;
            position: relative;
        }

        #cv-content ul li::before {
            content: "—";
            position: absolute;
            left: 0;
            opacity: 0.4;
        }

        #cv-content strong {
            color: var(--text-color);
            font-weight: 500;
        }

        #cv-loading {
            padding: 2rem;
            text-align: center;
            font-style: italic;
            color: var(--dim-color);
        }
    </style>
</head>
<body>

    <header>
        <h1 id="username">LI Zhengxuan</h1>
        <p class="bio" id="user-bio">2025-2026 City University of Hong Kong <br> 2018-2022 China University of Geosciences(Beijing) <br> C++/Computer Graphics/Machine Learning/Web 3</p>
        <div class="nav-links">
            <a href="index.html" id="nav-resume" class="active">RESUME</a>
            <a href="repositories.html" id="nav-repos">REPOSITORIES</a>
            <a href="translations.html" id="nav-trans">TRANSLATIONS</a>
            <a href="photography.html" id="nav-photos">PHOTOGRAPHY</a>
            <a href="https://github.com/Verginius" target="_blank">GITHUB</a>
            <a href="mailto:lizhengxuan_2023@outlook.com">EMAIL</a>
        </div>
    </header>

    <main>
        <div id="cv-loading">Loading resume...</div>
        <div id="cv-content"></div>
    </main>

    <footer>
        <span>&copy; <span id="year"></span> VERGINIUS</span>
        <span>LI ZHENGXUAN</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        async function loadCV() {
            try {
                const SQL = await initSqlJs({
                    locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${file}`
                });
                const response = await fetch('assets/data.db');
                if (!response.ok) throw new Error('DB not found');
                const buffer = await response.arrayBuffer();
                const db = new SQL.Database(new Uint8Array(buffer));

                const result = db.exec("SELECT content FROM documents WHERE name = 'cv'");
                if (result.length > 0) {
                    document.getElementById('cv-loading').style.display = 'none';
                    document.getElementById('cv-content').innerHTML = marked.parse(result[0].values[0][0]);
                }
            } catch (err) {
                document.getElementById('cv-loading').textContent = 'Unable to load resume.';
                console.error(err);
            }
        }

        window.addEventListener('DOMContentLoaded', loadCV);
    </script>
